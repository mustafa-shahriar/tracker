<div class="min-h-screen w-full flex flex-col">
  <app-navbar></app-navbar>

  <div class="w-full flex flex-col items-center px-4 sm:px-6 py-6 gap-6">
    <div class="w-full max-w-6xl">
      <div class="card bg-base-200 shadow-md">
        <div class="card-body">
          <h1 class="text-2xl font-bold">My Torrents</h1>

          <p class="text-sm opacity-80 mt-1">These are the torrents uploaded by you.</p>
        </div>
      </div>
    </div>

    @if (error()) {
      <div class="w-full max-w-6xl">
        <div class="alert alert-error">
          {{ error() }}
        </div>
      </div>
    } @else if (!torrents()) {
      <div class="w-full max-w-6xl flex flex-col gap-4">
        @for (i of [1, 2, 3, 4, 5]; track i) {
          <div class="card bg-base-200 shadow-md">
            <div class="card-body gap-3">
              <div class="skeleton h-6 w-1/3"></div>

              <div class="skeleton h-4 w-2/3"></div>

              <div class="flex gap-2">
                <div class="skeleton h-4 w-16"></div>
                <div class="skeleton h-4 w-16"></div>
              </div>
            </div>
          </div>
        }
      </div>
    } @else {
      <div class="w-full max-w-6xl flex flex-col gap-4">
        @if (torrents()!.length === 0) {
          <div class="alert alert-info">You have not uploaded any torrents yet.</div>
        } @else {
          @for (t of torrents(); track t.id) {
            <app-torrent-card [torrent]="t" />
          }
        }
      </div>
    }
  </div>
</div>
