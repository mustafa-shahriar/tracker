<div class="min-h-screen w-full flex flex-col">
  <app-navbar></app-navbar>

  <div class="w-full flex flex-col items-center px-4 sm:px-6 py-6 gap-6">
    <div class="w-full max-w-6xl">
      <div class="card bg-base-200 shadow-md">
        <div class="card-body">
          <h1 class="text-xl font-bold">Search torrents</h1>
          <app-search-bar [initial]="q()"></app-search-bar>
        </div>
      </div>
    </div>

    @if (error()) {
      <div class="w-full max-w-6xl">
        <div class="alert alert-error">
          {{ error() }}
        </div>
      </div>
    } @else {
      <div class="w-full max-w-6xl">
        <div class="card bg-base-200 shadow-md">
          <div class="card-body">
            <h2 class="text-lg font-bold">Search Results</h2>
            <p class="text-sm opacity-80 mt-1">result for: {{q()}}</p>
          </div>
        </div>
      </div>

      @if (!torrents()) {
        <div class="w-full max-w-6xl flex flex-col gap-4">
          @for (i of [1, 2, 3, 4, 5]; track i) {
            <div class="card bg-base-200 shadow-md">
              <div class="card-body gap-3">
                <div class="skeleton h-6 w-1/3"></div>
                <div class="skeleton h-4 w-2/3"></div>
                <div class="flex gap-2">
                  <div class="skeleton h-4 w-16"></div>
                  <div class="skeleton h-4 w-16"></div>
                </div>
              </div>
            </div>
          }
        </div>
      } @else {
        <div class="w-full max-w-6xl flex flex-col gap-4">
          @for (t of torrents(); track t.id) {
            <app-torrent-card [torrent]="t" class="w-full" />
          }

          @if (torrents()?.length === 0) {
            <div class="alert alert-info">Noting Found, try Searching for something else</div>
          }
        </div>
      }
    }
  </div>
</div>
