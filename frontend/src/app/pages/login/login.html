<div>
  @if (this.error()) {
    <div role="alert" class="alert alert-error">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6 shrink-0 stroke-current"
        fill="none"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
      <span>{{ this.error() }}</span>
    </div>
  }
  <form
    [formGroup]="loginForm"
    (ngSubmit)="onSubmit()"
    class="flex justify-center content-center h-full"
  >
    <div>
      <div class="hero-content flex-col lg:flex-row-reverse">
        <div class="text-center lg:text-left">
          <a routerLink="/register" class="link link-primary">Create Account</a>
          <p class="py-6">Access your private torrents securely and start sharing instantly.</p>
        </div>

        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
          <div class="card-body">
            <fieldset class="fieldset">
              <label class="label">Email</label>
              <input type="email" class="input" formControlName="email" placeholder="Email" />

              <label class="label">Password</label>
              <input
                type="password"
                class="input"
                formControlName="password"
                placeholder="Password"
              />

              <button
                type="submit"
                [disabled]="this.loginForm.invalid"
                class="btn btn-neutral mt-4"
              >
                Login
              </button>
            </fieldset>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
